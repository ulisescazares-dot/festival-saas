<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registro de Expositor</title>

  <style>
    body{font-family:system-ui,Arial;margin:0;background:#f6f7fb}
    .wrap{max-width:980px;margin:24px auto;padding:16px}
    .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    label{font-size:12px;color:#555;display:block;margin-bottom:6px}
    input,select,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:14px}
    textarea{min-height:90px}
    h2{margin:0 0 8px 0}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 14px;border-radius:10px;border:0;cursor:pointer;font-weight:600}
    .btn-primary{background:#111;color:#fff}
    .btn-muted{background:#eee}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid #eee;padding:10px;text-align:left;font-size:14px}
    canvas{border:1px dashed #aaa;border-radius:10px;background:#fff;touch-action:none}
    .ok{color:#0a7a2f;font-weight:700}
    .err{color:#b00020;font-weight:700}
    @media (max-width: 800px){ .grid{grid-template-columns:1fr} }
  </style>
</head>
<body>

<div class="wrap">

  <div class="card">
    <h2>Registro + Firma del Expositor</h2>
    <div id="status"></div>
  </div>

  <!-- DATOS -->
  <div class="card">
    <h2>Datos del Expositor</h2>
    <div class="grid">
      <div>
        <label>Nombre comercial *</label>
        <input id="business_name" />
      </div>
      <div>
        <label>Razón social</label>
        <input id="legal_name" />
      </div>
      <div>
        <label>RFC</label>
        <input id="rfc" />
      </div>
      <div>
        <label>Correo *</label>
        <input id="email" />
      </div>
      <div>
        <label>Nombre de contacto *</label>
        <input id="contact_name" />
      </div>
      <div>
        <label>Teléfono</label>
        <input id="phone" />
      </div>
      <div>
        <label>Dirección</label>
        <input id="address" />
      </div>
      <div>
        <label>Instagram</label>
        <input id="instagram" />
      </div>
    </div>
  </div>

  <!-- ELECTRICOS -->
  <div class="card">
    <h2>Requisitos Eléctricos</h2>
    <div class="grid">
      <div>
        <label>Amperaje total estimado</label>
        <input id="total_amperage" type="number" step="0.1" />
      </div>
      <div>
        <label>Voltaje</label>
        <select id="voltage">
          <option value="110">110</option>
          <option value="220">220</option>
        </select>
      </div>
    </div>

    <div class="row">
      <label><input id="needs_220" type="checkbox"> Requiero conexión 220V</label>
      <label><input id="own_generator" type="checkbox"> Llevo generador</label>
    </div>

    <div>
      <label>Notas eléctricas</label>
      <textarea id="electrical_notes"></textarea>
    </div>
  </div>

  <!-- EQUIPO -->
  <div class="card">
    <h2>Equipo que llevarás</h2>
    <button class="btn btn-muted" id="add_item">+ Agregar equipo</button>

    <table id="equipment_table">
      <thead>
        <tr>
          <th>Equipo</th>
          <th>Cantidad</th>
          <th>Watts</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- ACEPTACIONES -->
  <div class="card">
    <h2>Aceptaciones</h2>

    <label>
      <input id="accepted_reglamento" type="checkbox">
      Acepto el Reglamento *
    </label>

    <label>
      <input id="accepted_carta" type="checkbox">
      Acepto la Carta Responsiva *
    </label>

    <label>Nombre del firmante *</label>
    <input id="signer_name" />
  </div>

  <!-- DOCUMENTOS -->
  <div class="card">
    <h2>Documentos</h2>

    <label>INE</label>
    <input type="file" id="doc_ine" accept="application/pdf">

    <label>Constancia fiscal</label>
    <input type="file" id="doc_constancia" accept="application/pdf">
  </div>

  <!-- FIRMA -->
  <div class="card">
    <h2>Firma</h2>
    <button class="btn btn-muted" id="clear_sig">Limpiar firma</button>
    <canvas id="sig" width="900" height="220"></canvas>
  </div>

  <div class="card">
    <button class="btn btn-primary" id="submit">Guardar y Firmar</button>
  </div>

</div>

<script>

// ===== SLUG =====
const SLUG = window.location.pathname.split("/")[2];

let exhibitorId = null;

// ===== FIRMA =====
const canvas = document.getElementById("sig");
const ctx = canvas.getContext("2d");
ctx.lineWidth = 3;
ctx.lineCap = "round";

let drawing=false, last=null;

function pos(e){
  const r=canvas.getBoundingClientRect();
  return {
    x:(e.touches?e.touches[0].clientX:e.clientX)-r.left,
    y:(e.touches?e.touches[0].clientY:e.clientY)-r.top
  };
}
canvas.onmousedown=e=>{drawing=true;last=pos(e);}
canvas.onmousemove=e=>{
  if(!drawing)return;
  const p=pos(e);
  ctx.beginPath();
  ctx.moveTo(last.x,last.y);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
  last=p;
}
window.onmouseup=()=>drawing=false;

document.getElementById("clear_sig").onclick=()=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);
};

// ===== EQUIPO =====
const tbody=document.querySelector("#equipment_table tbody");

function addRow(){
  const tr=document.createElement("tr");
  tr.innerHTML=`
    <td><input class="eq_name"></td>
    <td><input class="eq_qty" type="number" value="1"></td>
    <td><input class="eq_watts" type="number"></td>
    <td><button>X</button></td>
  `;
  tr.querySelector("button").onclick=()=>tr.remove();
  tbody.appendChild(tr);
}
addRow();
document.getElementById("add_item").onclick=e=>{
  e.preventDefault();
  addRow();
};

// ===== SUBMIT =====
document.getElementById("submit").onclick=async()=>{

  const payload={
    exhibitor:{
      business_name:business_name.value,
      legal_name:legal_name.value,
      rfc:rfc.value,
      email:email.value,
      contact_name:contact_name.value,
      phone:phone.value,
      address:address.value,
      instagram:instagram.value
    },
    electrical:{
      total_amperage:total_amperage.value,
      voltage:voltage.value,
      needs_220:needs_220.checked,
      own_generator:own_generator.checked,
      notes:electrical_notes.value
    },
    equipment:Array.from(tbody.querySelectorAll("tr")).map(tr=>({
      name:tr.querySelector(".eq_name").value,
      quantity:tr.querySelector(".eq_qty").value,
      watts:tr.querySelector(".eq_watts").value
    })),
    agreement:{
      accepted_reglamento:accepted_reglamento.checked,
      accepted_carta_responsiva:accepted_carta.checked,
      signer_name:signer_name.value,
      signature_base64:canvas.toDataURL("image/png")
    }
  };

  const r=await fetch(`/f/${SLUG}/register`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });

  const data=await r.json();

  if(!r.ok){alert(data.msg);return;}

  exhibitorId=data.exhibitor_id;

  // subir documentos
  async function upload(file,type){
    const fd=new FormData();
    fd.append("file",file);
    fd.append("doc_type",type);
    await fetch(`/f/${SLUG}/${exhibitorId}/upload`,{
      method:"POST",
      body:fd
    });
  }

  if(doc_ine.files[0])await upload(doc_ine.files[0],"INE");
  if(doc_constancia.files[0])await upload(doc_constancia.files[0],"CONSTANCIA");

  alert("Registro completado correctamente");
};

</script>

</body>
</html>
