<!DOCTYPE html>
<html>
<head>
<title>Festival SaaS</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    background:#f5f7fa;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:#0f172a;
    height:100vh;
    position:fixed;
    color:white;
    padding:25px 20px;
}

.sidebar h2{
    margin:0 0 30px 0;
    font-weight:600;
}

.sidebar button{
    width:100%;
    background:none;
    border:none;
    color:#cbd5e1;
    padding:12px;
    text-align:left;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:8px;
}

.sidebar button:hover{
    background:#1e293b;
    color:white;
}

/* MAIN */
.main{
    margin-left:240px;
    padding:40px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.topbar h1{
    margin:0;
    font-size:28px;
    font-weight:600;
}

.logout{
    background:#ef4444;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
}

/* METRICS */
.metrics{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:40px;
}

.metric-card{
    background:white;
    padding:25px;
    border-radius:14px;
    box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.metric-card h3{
    margin:0;
    font-size:14px;
    color:#64748b;
}

.metric-card p{
    margin:8px 0 0 0;
    font-size:24px;
    font-weight:600;
}

/* CARD */
.card{
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
    margin-bottom:30px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid #e2e8f0;
}

button.primary{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:14px;
    border-bottom:1px solid #eee;
}

th{
    text-align:left;
    color:#64748b;
    font-weight:500;
}

.signed{color:#16a34a;font-weight:600;}
.pending{color:#dc2626;font-weight:600;}
</style>
</head>
<body>

<div class="sidebar">
<h2>Festival SaaS</h2>

<button onclick="showFestivalForm()">Crear Festival</button>

<button onclick="loadFestivals()">Ver Festivales</button>

<button onclick="showCompetitionGlobalForm()">
Crear Competencia
</button>

<button onclick="logout()">Cerrar sesión</button>
</div>

<div class="main">

<div class="topbar">
<h1>Dashboard</h1>
</div>

<div class="metrics" id="metrics">
<div class="metric-card">
<h3>Total Expositores</h3>
<p id="total_count">0</p>
</div>
<div class="metric-card">
<h3>Firmados</h3>
<p id="signed_count">0</p>
</div>
<div class="metric-card">
<h3>Pendientes</h3>
<p id="pending_count">0</p>
</div>
<div class="metric-card">
<h3>Amperaje Total</h3>
<p id="amperage_total">0 A</p>
</div>
</div>

<div id="dynamicSection"></div>

<div class="card">
<h3>Expositores</h3>
<table>
<thead>
<tr>
<th>Festival</th>
<th>Evento</th>
<th>Negocio</th>
<th>Email</th>
<th>Estado</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>

function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
}    

async function showCompetitionGlobalForm(){

    const res = await fetch("/festivals", { credentials: "include" });
    const festivals = await res.json();

    let options = "";

    festivals.forEach(f=>{
        options += `<option value="${f.id}">${f.name}</option>`;
    });

    document.getElementById("dynamicSection").innerHTML = `
        <div class="card">
            <h3>Nueva Competencia</h3>

            <label>Festival</label>
            <select id="competitionFestivalId">
                ${options}
            </select>

            <input id="competitionName" placeholder="Nombre de la competencia">
            <input id="competitionDesc" placeholder="Descripción">
            <input id="competitionPrice" type="number" placeholder="Precio (ej. 350)">

            <button class="primary" onclick="createCompetitionGlobal()">
                Crear Competencia
            </button>
        </div>
    `;
}
async function createCompetitionGlobal(){

    const csrf = getCookie("csrf_access_token");

    const festival_id = document.getElementById("competitionFestivalId").value;
    const name = document.getElementById("competitionName").value;
    const description = document.getElementById("competitionDesc").value;
    const price = document.getElementById("competitionPrice").value;

    const res = await fetch("/admin/Competitions", {
        method:"POST",
        credentials:"include",
        headers:{
            "Content-Type":"application/json",
            "X-CSRF-TOKEN": csrf
        },
        body: JSON.stringify({
            festival_id,
            name,
            description,
            price
        })
    });

    const data = await res.json();

    if(res.ok){
        alert("Competencia creada correctamente");
        loadFestivals();
    }else{
        alert(data.msg);
    }
}

function showFestivalForm(){
document.getElementById("dynamicSection").innerHTML=`
<div class="card">
<h3>Crear Festival</h3>
<input id="festivalName" placeholder="Nombre del festival">
<input id="festivalDesc" placeholder="Descripción">
<button class="primary" onclick="createFestival()">Guardar</button>
</div>
`
}

async function createFestival(){

    const csrf = getCookie("csrf_access_token");

    const res = await fetch("/festivals",{
        method:"POST",
        credentials:"include",
        headers:{
            "Content-Type":"application/json",
            "X-CSRF-TOKEN": csrf
        },
        body:JSON.stringify({
            name:festivalName.value,
            description:festivalDesc.value
        })
    })

    if(res.ok){
        alert("Festival creado");
        loadFestivals();
    }else{
        alert("Error");
    }
}

async function loadFestivals(){

const res=await fetch("/festivals",{credentials:"include"})
const data=await res.json()

let html=`<div class="card"><h3>Mis Festivales</h3>`

data.forEach(f=>{
const url=`${window.location.origin}/public/f/${f.slug}`

html+=`
<div style="margin-bottom:20px;">
<strong>${f.name}</strong><br>
${f.description||""}<br><br>
<input value="${url}" readonly>
<button class="primary" onclick="generateQR('${url}')">Generar QR</button>
</div>
<hr>
`
})

html+=`</div>`
dynamicSection.innerHTML=html
}

function generateQR(url){
dynamicSection.innerHTML+=`<div class="card"><div id="qr"></div></div>`
new QRCode(document.getElementById("qr"),{
text:url,
width:220,
height:220
})
}

async function loadExhibitors(festivalId){

const res=await fetch(`/festivals/${festivalId}/exhibitors`,{
credentials:"include"
})

const data=await res.json()

let total=0,signed=0,amp=0
tableBody.innerHTML=""

data.forEach(ex=>{
total++
if(ex.signed) signed++
amp+=ex.total_amperage||0

tableBody.innerHTML+=`
<tr>
<td>${ex.festival}</td>
<td>${ex.event}</td>
<td>${ex.business_name}</td>
<td>${ex.email}</td>
<td class="${ex.signed?'signed':'pending'}">
${ex.signed?'Firmado':'Pendiente'}
</td>
</tr>
`
})

total_count.innerText=total
signed_count.innerText=signed
pending_count.innerText=total-signed
amperage_total.innerText=amp+" A"
}

async function loadCompetitions(festivalId, festivalSlug){

    const res = await fetch(
        `/admin/Competitions/festival/${festivalId}`,
        { credentials: "include" }
    );

    const data = await res.json();

    let html = "<div class='card'><h4>Competencias</h4>";

    if(data.length === 0){
        html += "<p>No hay competencias aún.</p>";
    }

    data.forEach(c => {

        const url = `${window.location.origin}/public/f/${festivalSlug}/competencia/${c.slug}`;

        html += `
            <div style="margin-bottom:15px;">
                <strong>${c.name}</strong><br>
                Precio: $${c.price} MXN<br>

                <input value="${url}" readonly style="width:100%;margin-top:8px;">
            </div>
            <hr>
        `;
    });

    html += "</div>";

    document.getElementById(`competitions_${festivalId}`).innerHTML = html;
}

async function logout(){
await fetch("/auth/logout",{method:"POST"})
window.location.href="/auth/login-page"
}

</script>

</body>
</html>
