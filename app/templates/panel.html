<!DOCTYPE html>
<html>
<head>
    <title>Festival SaaS - Panel</title>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

    <style>
        body { font-family: Arial; background: #f3f4f6; margin: 0; }
        header {
            background: #111827;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .actions {
            padding:20px;
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        button {
            background: #2563eb;
            border: none;
            padding: 10px 15px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button.logout { background:#ef4444; }

        table {
            width: 95%;
            margin: 30px auto;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th { background: #e5e7eb; }

        .signed { color: green; font-weight: bold; }
        .pending { color: red; font-weight: bold; }

        .card {
            background:white;
            padding:20px;
            margin:20px;
            border-radius:8px;
        }

        input { padding:8px; margin:5px 0; width:100%; }

        #metrics {
            display:flex;
            gap:20px;
            margin:20px;
        }

        #qr_container { margin-top:15px; }
    </style>
</head>
<body>

<header>
    <h2>Festival SaaS - Panel Administrador</h2>
    <button class="logout" onclick="logout()">Cerrar sesión</button>
</header>

<div class="actions">
    <button onclick="showFestivalForm()">Crear Festival</button>
    <button onclick="loadFestivals()">Ver Festivales</button>
</div>

<div id="dynamicSection"></div>

<hr>

<h3 style="margin-left:20px;">Expositores</h3>

<div id="metrics"></div>

<table>
    <thead>
        <tr>
            <th>Festival</th>
            <th>Evento</th>
            <th>Negocio</th>
            <th>Email</th>
            <th>Estado</th>
            <th>PDF</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>

// =====================
// UTIL
// =====================
function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
}

// =====================
// CREAR FESTIVAL
// =====================
function showFestivalForm() {
    document.getElementById("dynamicSection").innerHTML = `
        <div class="card">
            <h3>Crear Festival</h3>
            <input id="festivalName" placeholder="Nombre del festival">
            <input id="festivalDesc" placeholder="Descripción">
            <button onclick="createFestival()">Guardar</button>
        </div>
    `;
}

async function createFestival() {

    const csrf = getCookie("csrf_access_token");

    const name = document.getElementById("festivalName").value;
    const description = document.getElementById("festivalDesc").value;

    const res = await fetch("/festivals", {
        method: "POST",
        credentials: "include",
        headers: { 
            "Content-Type": "application/json",
            "X-CSRF-TOKEN": csrf
        },
        body: JSON.stringify({ name, description })
    });

    if(res.ok){
        alert("Festival creado");
        loadFestivals();
    } else {
        alert("Error creando festival");
    }
}

// =====================
// VER FESTIVALES
// =====================
async function loadFestivals() {

    const res = await fetch("/festivals", { credentials: "include" });
    const data = await res.json();

    let html = `<div class="card"><h3>Mis Festivales</h3>`;

    data.forEach(f => {

        const publicUrl = `${window.location.origin}/f/${f.slug}`;

        html += `
            <div style="margin-bottom:20px;">
                <strong>${f.name}</strong><br>
                ${f.description || ""}
                <br><br>

                <button onclick="loadExhibitors(${f.id})">Ver Expositores</button>
                <button onclick="generateQR('${f.slug}')">Generar QR</button>
                <button onclick="exportExcel(${f.id})">Exportar Excel</button>

                <div id="qr_container_${f.id}"></div>
                <p style="font-size:12px;color:#555;">Link público: ${publicUrl}</p>
            </div>
            <hr>
        `;
    });

    html += `</div>`;
    document.getElementById("dynamicSection").innerHTML = html;
}

// =====================
// QR
// =====================
function generateQR(slug) {

    const url = `${window.location.origin}/f/${slug}`;

    const container = document.createElement("div");
    container.innerHTML = "";
    new QRCode(container, {
        text: url,
        width: 200,
        height: 200
    });

    document.getElementById("dynamicSection").appendChild(container);
}

// =====================
// EXPORTAR EXCEL
// =====================
function exportExcel(festivalId) {
    window.location = `/festivals/${festivalId}/export`;
}

// =====================
// EXHIBITORS
// =====================
async function loadExhibitors(festivalId) {

    const res = await fetch(`/festivals/${festivalId}/exhibitors`, {
        credentials: "include"
    });

    const data = await res.json();

    let total = 0;
    let signed = 0;
    let amperage = 0;

    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";

    data.forEach(ex => {
        total++;
        if (ex.signed) signed++;
        amperage += ex.total_amperage;

        tableBody.innerHTML += `
            <tr>
                <td>${ex.festival}</td>
                <td>${ex.event}</td>
                <td>${ex.business_name}</td>
                <td>${ex.email}</td>
                <td class="${ex.signed ? 'signed' : 'pending'}">
                    ${ex.signed ? 'Firmado' : 'Pendiente'}
                </td>
                <td>-</td>
            </tr>
        `;
    });

    document.getElementById("metrics").innerHTML = `
        <div class="card"><strong>Total:</strong> ${total}</div>
        <div class="card"><strong>Firmados:</strong> ${signed}</div>
        <div class="card"><strong>Pendientes:</strong> ${total - signed}</div>
        <div class="card"><strong>Amperaje total:</strong> ${amperage} A</div>
    `;
}

// =====================
// LOGOUT
// =====================
async function logout() {
    await fetch("/auth/logout", { method: "POST" });
    window.location.href = "/auth/login-page";
}

</script>

</body>
</html>
