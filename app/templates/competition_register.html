<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ competition.name }}</title>

<style>
body{font-family:system-ui;margin:0;background:#f4f6f9}
.wrap{max-width:600px;margin:40px auto;background:white;padding:30px;border-radius:12px}
input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
button{width:100%;padding:12px;background:#111;color:white;border:none;border-radius:8px;cursor:pointer}
h2{text-align:center}
.success{color:green;font-weight:bold}
.error{color:red;font-weight:bold}
</style>
</head>
<body>

<div class="wrap">
<h2>{{ competition.name }}</h2>
<p style="text-align:center;">Registro oficial — Costo $350 MXN</p>

<div id="msg"></div>

<input id="name" placeholder="Nombre completo">
<input id="email" placeholder="Correo electrónico">
<input id="phone" placeholder="Número celular">
<input id="age" type="number" placeholder="Edad">
<input id="coffee_shop" placeholder="Cafetería de donde vienes">

<button onclick="register()">Pagar y Registrarme</button>
</div>

<script>

async function register(){

    const payload = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        age: document.getElementById("age").value,
        coffee_shop: document.getElementById("coffee_shop").value
    }

    const response = await fetch(
        window.location.pathname + "/register",
        {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(payload)
        }
    )

    const data = await response.json()

    if(response.ok){
        window.location.href = data.checkout_url
    } else {
        document.getElementById("msg").innerHTML =
            `<div class="error">${data.msg}</div>`
    }
}

</script>

</body>
</html>
